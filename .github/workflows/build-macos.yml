name: Build ReupTool for macOS (Intel)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-macos-intel:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download yt-dlp for macOS
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o yt-dlp
          chmod +x yt-dlp
          echo "Downloaded yt-dlp:"
          ./yt-dlp --version

      - name: Install FFmpeg via Homebrew
        run: |
          brew install ffmpeg
          echo "Installed FFmpeg:"
          ffmpeg -version | head -1
          # Copy ffmpeg binary vào thư mục build
          cp $(which ffmpeg) ./ffmpeg

      - name: Build app (.app)
        run: |
          pyinstaller \
            --clean \
            --windowed \
            --target-arch x86_64 \
            --name ReupTool \
            --hidden-import "reup_tool_widget" \
            --hidden-import "srt_parser" \
            --hidden-import "capcut_srt_gui" \
            --icon "logo.png" \
            --add-data "logo.png:." \
            --add-data "logo.ico:." \
            --add-binary "ffmpeg:." \
            --add-data "yt-dlp:." \
            app.py

      - name: Package ZIP + DMG
        run: |
          cd dist
          zip -r ReupTool-macOS-intel.zip ReupTool.app
          hdiutil create -volname "ReupTool" -srcfolder ReupTool.app -ov -format UDZO ReupTool-macOS-intel.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReupTool-macOS-intel
          path: |
            dist/ReupTool-macOS-intel.zip
            dist/ReupTool-macOS-intel.dmg
